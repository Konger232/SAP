<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Trial</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script> 
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style type="text/css">
        h1.title {font-size: 20px; color: #1038cb;} 
        p#quote {
            width:400px;
            text-align:center;
        }
        a.nav {
            width:200px; display:block;
            height:20px;
            border-bottom:2px solid lightgrey;
            text-decoration: none; 
            color:darkcyan
        }
    </style>

</head>
<body>
    <!-- Target Root for rendering-->
    <div id="myapp"></div>
    <div id="myquote"></div>
    <div id="myForm"></div>
    
    
    <script>
        var hello = React.createElement(
            "h1", 
            {id: "main", className:"title"}, 
            "Hello React World!"
        );
        var myLink = React.createElement(
           "a",                                                     //tag
           {href:"http://www.weather.com", target:"_blank"},        //attributes
           "See the weather"                                        //innerText
        )
        var myParagraph = React.createElement(
            "p",
            {className:"quote"},
            "Four Score and seven years ago",
            React.createElement("a", {className:"nav", href:"./about"}, "About Us"),
            React.createElement("a", {className:"nav", href:"./service"}, "Service"),
            React.createElement("a", {className:"nav", href:"./contact"}, "Contact"),
            React.createElement("a", {href:"https://www.imdb.com", target:"_blank"}, "Movies")
        );
        var myList = React.createElement(
            "div", null, 
            React.createElement(
                "ol", null,
                React.createElement("li", null, "Movies"),
                React.createElement("li", null, "Sports"),
                React.createElement("li", null, "Games"),
                ),
            React.createElement(
                "ul", null,
                [ React.createElement("li", null, "Movies"),
                React.createElement("li", null, "Sports"),
                React.createElement("li", null, "Games"),
                ])    
        ); //createElement DIV

        var choices = ["Basic", "Standard", "Premium"];
        var mySelect = React.createElement(
            "select",
            {name: "pick"},
            choices.map((item, idx)=>React.createElement("option", {key:idx}, item)) // create as an array of child elements
        );

        choiceElements = []
        for (i=0; i<choices.length; i++) {
            item = choices[i];
            choiceElements.push(React.createElement("li", null, item))
        }
        var myList2 = React.createElement(
            "div", 
            null,
            React.createElement(
                "ol", 
                null,
                choiceElements
            ) // end of <ol> createElement
        ); // end of <div> create element


        const myRoot = ReactDOM.createRoot(document.querySelector("#myapp"));
        const myRoot1 = ReactDOM.createRoot(document.getElementById("myquote"))
        const myRoot2 = ReactDOM.createRoot(document.getElementById("myForm"));
        
        myRoot.render(myLink);
        myRoot1.render(myParagraph);
        myRoot2.render(mySelect);
    
    </script>

</body>
</html>
